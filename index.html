<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#14532d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="매입장부" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>꽃집 매입장부</title>
<style>
  :root{
    --green:#14532d;
    --green-2:#1f7a52;
    --rose:#be123c;
    --bg:#f5f7f4;
    --card:#ffffff;
    --line:#e6e9e4;
    --ink:#1d2521;
    --muted:#6b7770;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(20,83,45,.05);
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--ink);
    font-size:16px;line-height:1.45;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px;}
  header.app{
    position:sticky;top:0;z-index:20;
    background:var(--green);color:#fff;
    padding:calc(14px + env(safe-area-inset-top)) 16px 14px;
    display:flex;align-items:center;gap:10px;
  }
  header.app .logo{font-size:22px;}
  header.app h1{font-size:18px;margin:0;font-weight:700;letter-spacing:-.3px;}
  header.app .sub{font-size:12px;opacity:.8;margin-left:auto;font-weight:500;}

  .view{display:none;padding-top:16px;}
  .view.active{display:block;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;box-shadow:var(--shadow);margin-bottom:14px;
  }
  .card h2{font-size:15px;margin:0 0 12px;font-weight:700;color:var(--green);}
  label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin:0 0 6px;}
  .field{margin-bottom:14px;}
  input,select{
    width:100%;font-size:17px;padding:13px 14px;border:1.5px solid var(--line);
    border-radius:12px;background:#fff;color:var(--ink);font-family:inherit;
    outline:none;transition:border-color .15s;
  }
  input:focus,select:focus{border-color:var(--green-2);}
  input[inputmode="numeric"]{text-align:right;letter-spacing:.3px;font-weight:600;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;}
  .amount-preview{font-size:13px;color:var(--green-2);font-weight:700;margin-top:6px;min-height:18px;}

  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{
    width:100%;background:var(--green);color:#fff;font-size:17px;font-weight:700;
    padding:15px;border-radius:14px;box-shadow:var(--shadow);
    transition:transform .05s,opacity .15s;
  }
  .btn:active{transform:scale(.98);}
  .btn.secondary{background:#fff;color:var(--green);border:1.5px solid var(--line);box-shadow:none;}
  .btn.rose{background:var(--rose);}
  .btn.ghost{background:transparent;color:var(--muted);box-shadow:none;font-size:14px;padding:10px;}
  .btn.sm{font-size:14px;padding:10px 14px;width:auto;}

  /* period selector */
  .period{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{
    background:#fff;border:1.5px solid var(--line);border-radius:999px;
    padding:8px 14px;font-size:14px;font-weight:600;color:var(--muted);
  }
  .chip.on{background:var(--green);color:#fff;border-color:var(--green);}
  .range{display:none;gap:8px;margin-bottom:14px;}
  .range.show{display:flex;}
  .range input{font-size:15px;padding:10px;}

  /* totals */
  .total-card{background:linear-gradient(135deg,var(--green),var(--green-2));color:#fff;border:none;}
  .total-card .label{font-size:13px;opacity:.85;font-weight:600;}
  .total-card .num{font-size:34px;font-weight:800;letter-spacing:-1px;margin-top:2px;}
  .total-card .meta{font-size:13px;opacity:.85;margin-top:4px;}

  /* rank bars */
  .rank-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .rank-row:last-child{border-bottom:none;}
  .rank-no{width:24px;height:24px;border-radius:8px;background:var(--bg);color:var(--muted);
    font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .rank-no.top{background:var(--green);color:#fff;}
  .rank-main{flex:1;min-width:0;}
  .rank-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank-bar{height:7px;border-radius:4px;background:#e8ece8;margin-top:5px;overflow:hidden;}
  .rank-bar > i{display:block;height:100%;background:var(--green-2);border-radius:4px;}
  .rank-amt{font-size:14px;font-weight:700;color:var(--ink);flex:0 0 auto;white-space:nowrap;}

  /* history list */
  .hist-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
  .hist-row:last-child{border-bottom:none;}
  .hist-main{flex:1;min-width:0;}
  .hist-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hist-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .hist-amt{font-size:16px;font-weight:800;color:var(--green);white-space:nowrap;}
  .hist-del{color:var(--muted);font-size:13px;padding:6px 8px;background:none;}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
  .empty .big{font-size:34px;margin-bottom:8px;opacity:.5;}

  /* vendor list */
  .ven-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);}
  .ven-row:last-child{border-bottom:none;}
  .ven-no{flex:0 0 auto;min-width:42px;height:34px;padding:0 8px;border-radius:10px;background:var(--bg);
    color:var(--green);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .ven-main{flex:1;min-width:0;}
  .ven-name{font-size:16px;font-weight:700;}
  .ven-sub{font-size:12px;color:var(--muted);}
  .ven-go{color:var(--muted);font-size:20px;}

  /* bottom nav */
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:rgba(255,255,255,.96);backdrop-filter:saturate(180%) blur(10px);
    border-top:1px solid var(--line);
    display:flex;padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabs button{
    flex:1;background:none;padding:9px 0 8px;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;
  }
  nav.tabs button .ic{font-size:21px;line-height:1;}
  nav.tabs button.on{color:var(--green);}

  /* modal */
  .modal{position:fixed;inset:0;z-index:50;display:none;}
  .modal.show{display:block;}
  .modal .scrim{position:absolute;inset:0;background:rgba(0,0,0,.4);}
  .sheet{
    position:absolute;left:0;right:0;bottom:0;max-height:92vh;overflow:auto;
    background:var(--bg);border-radius:22px 22px 0 0;padding:18px 16px calc(24px + env(safe-area-inset-bottom));
    animation:up .22s ease;
  }
  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-bar{width:40px;height:4px;border-radius:3px;background:#d3d9d2;margin:0 auto 14px;}
  .sheet h3{margin:0 0 4px;font-size:19px;}
  .sheet .close{position:absolute;right:14px;top:14px;font-size:15px;color:var(--muted);background:none;}

  /* receipt canvas preview */
  #invCanvas{width:100%;border-radius:14px;border:1px solid var(--line);box-shadow:var(--shadow);background:#fff;display:block;}

  .toast{
    position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;
    opacity:0;pointer-events:none;transition:.25s;z-index:80;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  datalist{display:none;}
</style>
</head>
<body>

<header class="app">
  <span class="logo">🌷</span>
  <h1>꽃집 매입장부</h1>
  <span class="sub">그래머시플라워</span>
</header>

<main class="wrap">

  <!-- ====== 입력 ====== -->
  <section class="view active" id="view-input">
    <div class="card">
      <h2>영수증 입력</h2>
      <div class="field">
        <label>거래처 (이름 또는 업체번호)</label>
        <input id="in-vendor" list="vendorList" placeholder="예) 장미상회 또는 1234" autocomplete="off" />
        <datalist id="vendorList"></datalist>
        <div class="hint" id="vendor-hint">최근 거래처가 자동완성됩니다. 처음 보는 거래처면 아래에 번호를 정해주세요.</div>
      </div>

      <div id="newVendorBox" style="display:none">
        <div class="row">
          <div class="field" style="flex:0 0 38%">
            <label>업체번호 (1~9999)</label>
            <input id="in-vno" inputmode="numeric" placeholder="자동" />
          </div>
          <div class="field">
            <label>업체명</label>
            <input id="in-vname" placeholder="새 거래처 이름" autocomplete="off" />
          </div>
        </div>
      </div>

      <div class="field">
        <label>매입 날짜</label>
        <input id="in-date" type="date" />
      </div>

      <div class="field">
        <label>매입 금액 (원)</label>
        <input id="in-amount" inputmode="numeric" placeholder="0" />
        <div class="amount-preview" id="amount-preview"></div>
      </div>

      <button class="btn" id="saveBtn">저장하기</button>
    </div>

    <div class="card">
      <h2>오늘 입력 내역</h2>
      <div id="today-list"></div>
    </div>
  </section>

  <!-- ====== 내역 ====== -->
  <section class="view" id="view-history">
    <div class="period" data-scope="hist"></div>
    <div class="range" id="range-hist">
      <input type="date" id="hist-from" /><input type="date" id="hist-to" />
    </div>
    <div class="card total-card">
      <div class="label">선택 기간 매입 합계</div>
      <div class="num" id="hist-total">₩0</div>
      <div class="meta" id="hist-meta"></div>
    </div>
    <div class="card">
      <h2>매입 내역</h2>
      <div id="hist-list"></div>
    </div>
  </section>

  <!-- ====== 대시보드 ====== -->
  <section class="view" id="view-dash">
    <div class="period" data-scope="dash"></div>
    <div class="range" id="range-dash">
      <input type="date" id="dash-from" /><input type="date" id="dash-to" />
    </div>
    <div class="card total-card">
      <div class="label" id="dash-label">이번 달 총 매입 금액</div>
      <div class="num" id="dash-total">₩0</div>
      <div class="meta" id="dash-meta"></div>
    </div>
    <div class="card">
      <h2>업체별 매입 순위</h2>
      <div id="rank-list"></div>
    </div>
  </section>

  <!-- ====== 업체 ====== -->
  <section class="view" id="view-vendor">
    <div class="card">
      <h2>거래처 목록</h2>
      <div class="field" style="margin-bottom:10px">
        <input id="ven-search" placeholder="🔍 거래처 검색" autocomplete="off" />
      </div>
      <div id="ven-list"></div>
    </div>
    <button class="btn secondary" id="exportBtn">📤 데이터 백업 (파일 저장)</button>
    <div style="height:10px"></div>
    <button class="btn secondary" id="csvBtn">📊 엑셀용 CSV 내보내기</button>
    <div style="height:10px"></div>
    <label class="btn secondary" style="display:block;text-align:center" for="importFile">📥 백업 파일 복구</label>
    <input type="file" id="importFile" accept="application/json" style="display:none" />
  </section>

</main>

<!-- bottom nav -->
<nav class="tabs">
  <button data-tab="view-input" class="on"><span class="ic">✏️</span>입력</button>
  <button data-tab="view-history"><span class="ic">📋</span>내역</button>
  <button data-tab="view-dash"><span class="ic">📊</span>대시보드</button>
  <button data-tab="view-vendor"><span class="ic">🏪</span>거래처</button>
</nav>

<!-- vendor detail modal -->
<div class="modal" id="venModal">
  <div class="scrim" data-close></div>
  <div class="sheet">
    <div class="sheet-bar"></div>
    <button class="close" data-close>닫기</button>
    <h3 id="vm-name">거래처</h3>
    <div class="hint" id="vm-no"></div>

    <div class="card" style="margin-top:14px">
      <label>세금계산서 발행 대상 기간</label>
      <div class="period" data-scope="vm"></div>
      <div class="range" id="range-vm">
        <input type="date" id="vm-from" /><input type="date" id="vm-to" />
      </div>
      <div style="text-align:center;padding:8px 0 4px">
        <div class="hint">선택 기간 합계</div>
        <div style="font-size:30px;font-weight:800;color:var(--green)" id="vm-total">₩0</div>
        <div class="hint" id="vm-count"></div>
      </div>
      <button class="btn rose" id="vm-invoice">🧾 전자세금계산서 발행정보 생성</button>
    </div>

    <div class="card">
      <label>거래처 정보 수정</label>
      <div class="field"><label>업체명</label><input id="vm-edit-name" /></div>
      <div class="field"><label>사업자번호 (선택)</label><input id="vm-edit-bizno" placeholder="000-00-00000" /></div>
      <div class="field"><label>메모 (선택)</label><input id="vm-edit-memo" placeholder="연락처 등" /></div>
      <button class="btn secondary sm" id="vm-save" style="width:100%">정보 저장</button>
    </div>
  </div>
</div>

<!-- invoice image modal -->
<div class="modal" id="invModal">
  <div class="scrim" data-close></div>
  <div class="sheet">
    <div class="sheet-bar"></div>
    <button class="close" data-close>닫기</button>
    <h3>전자세금계산서 발행정보</h3>
    <div class="hint" style="margin-bottom:12px">이미지를 저장하거나 바로 공유해서 계산서 발행을 요청하세요.</div>
    <canvas id="invCanvas"></canvas>
    <div style="height:14px"></div>
    <button class="btn" id="inv-share">📲 이미지 공유 (카톡 등)</button>
    <div style="height:10px"></div>
    <button class="btn secondary" id="inv-download">💾 이미지 저장</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================ 저장소 ============================ */
const KEY_V='gf_vendors', KEY_P='gf_purchases';
function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
function persist(){localStorage.setItem(KEY_V,JSON.stringify(vendors));localStorage.setItem(KEY_P,JSON.stringify(purchases));}
let vendors = load(KEY_V,[]);      // {code,name,bizno,memo}
let purchases = load(KEY_P,[]);    // {id,code,date:'YYYY-MM-DD',amount}

/* ============================ 유틸 ============================ */
const won = n => '₩'+Number(n||0).toLocaleString('ko-KR');
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function vendorByCode(c){return vendors.find(v=>v.code===c);}
function nextVno(){let m=0;vendors.forEach(v=>{if(v.code>m)m=v.code});return Math.min(m+1,9999);}

function numToKorean(num){
  num=Math.floor(Math.abs(num));
  if(num===0)return '영';
  const dg=['','일','이','삼','사','오','육','칠','팔','구'];
  const sm=['','십','백','천'];
  const bg=['','만','억','조','경'];
  let res='',gi=0;
  while(num>0){
    let group=num%10000;num=Math.floor(num/10000);
    if(group>0){
      let gs='',pos=0,g=group;
      while(g>0){
        let d=g%10;
        if(d>0)gs=((d===1&&pos>0)?'':dg[d])+sm[pos]+gs;
        g=Math.floor(g/10);pos++;
      }
      res=gs+bg[gi]+res;
    }
    gi++;
  }
  return res;
}

/* ============================ 기간 ============================ */
const PRESETS=[['이번달','thisMonth'],['지난달','lastMonth'],['올해','thisYear'],['전체','all'],['직접선택','custom']];
const periodState={hist:'thisMonth',dash:'thisMonth',vm:'thisMonth'};
const customRange={hist:{},dash:{},vm:{}};

function monthRange(offset){
  const d=new Date();const y=d.getFullYear(),m=d.getMonth()+offset;
  const from=new Date(y,m,1),to=new Date(y,m+1,0);
  return {from:fmt(from),to:fmt(to)};
}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function rangeFor(scope){
  const p=periodState[scope];
  if(p==='thisMonth')return monthRange(0);
  if(p==='lastMonth')return monthRange(-1);
  if(p==='thisYear'){const y=new Date().getFullYear();return{from:y+'-01-01',to:y+'-12-31'};}
  if(p==='all')return{from:'0000-01-01',to:'9999-12-31'};
  if(p==='custom')return{from:customRange[scope].from||'0000-01-01',to:customRange[scope].to||'9999-12-31'};
}
function inRange(p,r){return p.date>=r.from && p.date<=r.to;}
function periodLabel(scope){const p=periodState[scope];const f=PRESETS.find(x=>x[1]===p);return f?f[0]:'';}

function buildPeriodBars(){
  document.querySelectorAll('.period').forEach(bar=>{
    const scope=bar.dataset.scope;bar.innerHTML='';
    PRESETS.forEach(([label,val])=>{
      const c=document.createElement('button');
      c.className='chip'+(periodState[scope]===val?' on':'');
      c.textContent=label;
      c.onclick=()=>{periodState[scope]=val;refreshPeriodBar(scope);renderScope(scope);};
      bar.appendChild(c);
    });
  });
}
function refreshPeriodBar(scope){
  document.querySelectorAll('.period[data-scope="'+scope+'"] .chip').forEach((c,i)=>{
    c.classList.toggle('on',PRESETS[i][1]===periodState[scope]);
  });
  const rng=document.getElementById('range-'+scope);
  if(rng)rng.classList.toggle('show',periodState[scope]==='custom');
}
function renderScope(scope){
  if(scope==='hist')renderHistory();
  if(scope==='dash')renderDash();
  if(scope==='vm')renderVmTotal();
}

/* ============================ 입력 ============================ */
const inVendor=document.getElementById('in-vendor');
const newBox=document.getElementById('newVendorBox');
const inVno=document.getElementById('in-vno');
const inVname=document.getElementById('in-vname');
const inAmount=document.getElementById('in-amount');
const inDate=document.getElementById('in-date');

function refreshVendorDatalist(){
  const dl=document.getElementById('vendorList');
  // 매입 빈도순 정렬 → 자주 쓰는 거래처 우선
  const freq={};purchases.forEach(p=>freq[p.code]=(freq[p.code]||0)+1);
  const sorted=[...vendors].sort((a,b)=>(freq[b.code]||0)-(freq[a.code]||0));
  dl.innerHTML=sorted.map(v=>`<option value="${esc(v.name)}">${v.code}번</option>`).join('');
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function resolveVendorInput(){
  const raw=inVendor.value.trim();
  if(!raw)return null;
  // 숫자만 → 업체번호로 조회
  if(/^\d+$/.test(raw)){const v=vendorByCode(Number(raw));if(v)return v;}
  // 이름 일치
  const v=vendors.find(x=>x.name===raw);
  return v||null;
}
function updateVendorUI(){
  const raw=inVendor.value.trim();
  const v=resolveVendorInput();
  if(v){
    newBox.style.display='none';
    document.getElementById('vendor-hint').textContent='✅ '+v.name+' ('+v.code+'번)';
  } else if(raw){
    newBox.style.display='block';
    if(/^\d+$/.test(raw)){inVno.value=raw;inVname.value='';}
    else{inVname.value=raw;if(!inVno.value)inVno.value=nextVno();}
    document.getElementById('vendor-hint').textContent='🆕 새 거래처입니다. 번호와 이름을 확인하세요.';
  } else {
    newBox.style.display='none';
    document.getElementById('vendor-hint').textContent='최근 거래처가 자동완성됩니다. 처음 보는 거래처면 아래에 번호를 정해주세요.';
  }
}
inVendor.addEventListener('input',updateVendorUI);
inVendor.addEventListener('change',updateVendorUI);

inAmount.addEventListener('input',()=>{
  let v=inAmount.value.replace(/[^\d]/g,'');
  inAmount.value=v?Number(v).toLocaleString('ko-KR'):'';
  const n=Number(v||0);
  document.getElementById('amount-preview').textContent=n?('金 '+numToKorean(n)+'원정'):'';
});

document.getElementById('saveBtn').onclick=()=>{
  const amount=Number(inAmount.value.replace(/[^\d]/g,''));
  if(!amount){toast('금액을 입력하세요');inAmount.focus();return;}
  let v=resolveVendorInput();
  if(!v){
    const code=Number(inVno.value);
    const name=inVname.value.trim();
    if(!code||code<1||code>9999){toast('업체번호는 1~9999');inVno.focus();return;}
    if(vendorByCode(code)){toast(code+'번은 이미 사용 중입니다');return;}
    if(!name){toast('업체명을 입력하세요');inVname.focus();return;}
    v={code,name,bizno:'',memo:''};vendors.push(v);
  }
  const date=inDate.value||todayStr();
  purchases.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,6),code:v.code,date,amount});
  persist();
  toast('저장됐어요 · '+v.name+' '+won(amount));
  // reset for next quick entry
  inVendor.value='';inAmount.value='';document.getElementById('amount-preview').textContent='';
  newBox.style.display='none';inVno.value='';inVname.value='';
  updateVendorUI();refreshVendorDatalist();updateTodayCount();
  inVendor.focus();
};

function updateTodayCount(){
  const t=todayStr();
  const list=purchases.filter(p=>p.date===t).sort((a,b)=>b.id.localeCompare(a.id));
  const sum=list.reduce((a,p)=>a+p.amount,0);
  const box=document.getElementById('today-list');
  if(!list.length){box.innerHTML='<div class="empty" style="padding:24px">아직 오늘 입력한 영수증이 없습니다<br><span style="font-size:12px">위에서 저장하면 여기에 바로 쌓입니다</span></div>';return;}
  box.innerHTML='<div style="font-weight:700;color:var(--green);margin-bottom:8px">합계 '+won(sum)+' · '+list.length+'건</div>'+
    list.map(p=>{const v=vendorByCode(p.code);return `<div class="hist-row">
      <div class="hist-main"><div class="hist-name">${esc(v?v.name:'('+p.code+'번)')}</div><div class="hist-sub">${p.code}번</div></div>
      <div class="hist-amt">${won(p.amount)}</div>
      <button class="hist-del" data-tdel="${p.id}">삭제</button></div>`;}).join('');
  box.querySelectorAll('[data-tdel]').forEach(b=>b.onclick=()=>{
    if(!confirm('이 영수증을 삭제할까요?'))return;
    purchases=purchases.filter(x=>x.id!==b.dataset.tdel);persist();updateTodayCount();
  });
}

/* ============================ 내역 ============================ */
function renderHistory(){
  const r=rangeFor('hist');
  const list=purchases.filter(p=>inRange(p,r)).sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  const sum=list.reduce((a,p)=>a+p.amount,0);
  document.getElementById('hist-total').textContent=won(sum);
  document.getElementById('hist-meta').textContent=periodLabel('hist')+' · 영수증 '+list.length+'건';
  const box=document.getElementById('hist-list');
  if(!list.length){box.innerHTML='<div class="empty"><div class="big">📭</div>해당 기간 내역이 없습니다</div>';return;}
  box.innerHTML=list.map(p=>{
    const v=vendorByCode(p.code);
    return `<div class="hist-row">
      <div class="hist-main">
        <div class="hist-name">${esc(v?v.name:'(삭제된 거래처)')}</div>
        <div class="hist-sub">${p.date} · ${p.code}번</div>
      </div>
      <div class="hist-amt">${won(p.amount)}</div>
      <button class="hist-del" data-del="${p.id}">삭제</button>
    </div>`;
  }).join('');
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    if(!confirm('이 영수증을 삭제할까요?'))return;
    purchases=purchases.filter(x=>x.id!==b.dataset.del);persist();renderHistory();updateTodayCount();
  });
}

/* ============================ 대시보드 ============================ */
function renderDash(){
  const r=rangeFor('dash');
  const list=purchases.filter(p=>inRange(p,r));
  const sum=list.reduce((a,p)=>a+p.amount,0);
  document.getElementById('dash-label').textContent=periodLabel('dash')+' 총 매입 금액';
  document.getElementById('dash-total').textContent=won(sum);
  document.getElementById('dash-meta').textContent='거래처 '+new Set(list.map(p=>p.code)).size+'곳 · 영수증 '+list.length+'건';
  const agg={};
  list.forEach(p=>agg[p.code]=(agg[p.code]||0)+p.amount);
  const rows=Object.entries(agg).map(([c,a])=>({code:Number(c),amt:a})).sort((a,b)=>b.amt-a.amt);
  const max=rows.length?rows[0].amt:1;
  const box=document.getElementById('rank-list');
  if(!rows.length){box.innerHTML='<div class="empty"><div class="big">📊</div>해당 기간 매입이 없습니다</div>';return;}
  box.innerHTML=rows.map((row,i)=>{
    const v=vendorByCode(row.code);
    return `<div class="rank-row">
      <div class="rank-no ${i<3?'top':''}">${i+1}</div>
      <div class="rank-main">
        <div class="rank-name">${esc(v?v.name:'('+row.code+'번)')}</div>
        <div class="rank-bar"><i style="width:${Math.max(4,row.amt/max*100)}%"></i></div>
      </div>
      <div class="rank-amt">${won(row.amt)}</div>
    </div>`;
  }).join('');
}

/* ============================ 거래처 ============================ */
function renderVendors(){
  const q=document.getElementById('ven-search').value.trim().toLowerCase();
  const total={};purchases.forEach(p=>total[p.code]=(total[p.code]||0)+p.amount);
  let list=[...vendors];
  if(q)list=list.filter(v=>v.name.toLowerCase().includes(q)||String(v.code).includes(q));
  list.sort((a,b)=>(total[b.code]||0)-(total[a.code]||0));
  const box=document.getElementById('ven-list');
  if(!vendors.length){box.innerHTML='<div class="empty"><div class="big">🏪</div>아직 등록된 거래처가 없습니다<br>입력 탭에서 영수증을 저장하면 자동 등록됩니다</div>';return;}
  if(!list.length){box.innerHTML='<div class="empty">검색 결과가 없습니다</div>';return;}
  box.innerHTML=list.map(v=>`
    <div class="ven-row" data-ven="${v.code}">
      <div class="ven-no">${v.code}</div>
      <div class="ven-main">
        <div class="ven-name">${esc(v.name)}</div>
        <div class="ven-sub">누적 ${won(total[v.code]||0)}${v.bizno?' · '+esc(v.bizno):''}</div>
      </div>
      <div class="ven-go">›</div>
    </div>`).join('');
  box.querySelectorAll('[data-ven]').forEach(r=>r.onclick=()=>openVendor(Number(r.dataset.ven)));
}
document.getElementById('ven-search').addEventListener('input',renderVendors);

/* ============================ 거래처 상세 모달 ============================ */
let currentVendor=null;
function openVendor(code){
  const v=vendorByCode(code);if(!v)return;currentVendor=v;
  document.getElementById('vm-name').textContent=v.name;
  document.getElementById('vm-no').textContent=v.code+'번 거래처';
  document.getElementById('vm-edit-name').value=v.name;
  document.getElementById('vm-edit-bizno').value=v.bizno||'';
  document.getElementById('vm-edit-memo').value=v.memo||'';
  periodState.vm='thisMonth';refreshPeriodBar('vm');renderVmTotal();
  show('venModal');
}
function vmRangeList(){
  const r=rangeFor('vm');
  return purchases.filter(p=>p.code===currentVendor.code&&inRange(p,r));
}
function renderVmTotal(){
  if(!currentVendor)return;
  const list=vmRangeList();
  const sum=list.reduce((a,p)=>a+p.amount,0);
  document.getElementById('vm-total').textContent=won(sum);
  document.getElementById('vm-count').textContent=periodLabel('vm')+' · 영수증 '+list.length+'건';
}
document.getElementById('vm-save').onclick=()=>{
  currentVendor.name=document.getElementById('vm-edit-name').value.trim()||currentVendor.name;
  currentVendor.bizno=document.getElementById('vm-edit-bizno').value.trim();
  currentVendor.memo=document.getElementById('vm-edit-memo').value.trim();
  persist();document.getElementById('vm-name').textContent=currentVendor.name;
  refreshVendorDatalist();toast('저장됐어요');
};

/* ============================ 세금계산서 이미지 ============================ */
const ISSUER={
  title:'전자세금계산서 발행 정보',
  shop:'그래머시플라워 성의회관점 / 대표 이준용',
  bizno:'사업자번호 : 641-91-02374',
  type:'업태 : 소매   /   종목 : 꽃집',
  addr:'서울특별시 서초구 반포대로 222 성의회관 1층',
  brand:'그래머시플라워',
  email:'gramercyflower.banpo@gmail.com',
  tel:'Tel : 010-8474-2523'
};
document.getElementById('vm-invoice').onclick=()=>{
  const list=vmRangeList();
  const sum=list.reduce((a,p)=>a+p.amount,0);
  drawInvoice(currentVendor.name,sum,periodLabel('vm'),rangeFor('vm'));
  show('invModal');
};
function drawInvoice(vname,amount,plabel,range){
  const cv=document.getElementById('invCanvas');
  const W=820,H=620,S=2;cv.width=W*S;cv.height=H*S;
  const x=cv.getContext('2d');x.scale(S,S);
  // bg
  x.fillStyle='#ffffff';x.fillRect(0,0,W,H);
  x.fillStyle='#14532d';x.fillRect(0,0,W,14);
  x.fillStyle='#14532d';x.fillRect(0,H-14,W,14);
  // title
  x.textBaseline='alphabetic';
  x.fillStyle='#14532d';x.font='700 30px "Malgun Gothic",sans-serif';x.textAlign='center';
  x.fillText('< '+ISSUER.title+' >',W/2,72);
  // highlight box (거래처 / 금액)
  const bx=46,bw=W-92,by=104,bh=132;
  x.fillStyle='#f3f7f4';roundRect(x,bx,by,bw,bh,16);x.fill();
  x.strokeStyle='#cfe0d6';x.lineWidth=1.5;roundRect(x,bx,by,bw,bh,16);x.stroke();
  x.textAlign='left';
  x.fillStyle='#6b7770';x.font='600 17px "Malgun Gothic",sans-serif';
  x.fillText('거래처명',bx+30,by+44);
  x.fillText('금       액',bx+30,by+92);
  x.fillStyle='#14532d';x.font='700 26px "Malgun Gothic",sans-serif';
  x.fillText(vname,bx+150,by+48);
  x.fillStyle='#be123c';x.font='800 30px "Malgun Gothic",sans-serif';
  const amtText=won(amount);
  const amtW=x.measureText(amtText).width;   // 30px 폰트 기준으로 먼저 측정
  x.fillText(amtText,bx+150,by+98);
  x.fillStyle='#6b7770';x.font='500 15px "Malgun Gothic",sans-serif';
  x.fillText('(金 '+numToKorean(amount)+'원정)',bx+150+amtW+18,by+96);
  // period note
  x.fillStyle='#9aa49e';x.font='500 14px "Malgun Gothic",sans-serif';x.textAlign='right';
  x.fillText('조회기간 : '+(range.from==='0000-01-01'?'전체':range.from)+' ~ '+(range.to==='9999-12-31'?'전체':range.to)+'  ('+plabel+')',bx+bw-24,by+bh+26);
  // issuer block
  x.textAlign='left';
  let y=by+bh+72;const lh=40;
  const lines=[
    ['700 22px','#1d2521',ISSUER.shop],
    ['500 19px','#3a443e',ISSUER.bizno],
    ['500 19px','#3a443e',ISSUER.type],
    ['500 19px','#3a443e',ISSUER.addr],
    ['700 20px','#14532d',ISSUER.brand],
    ['500 19px','#3a443e','Email : '+ISSUER.email],
    ['500 19px','#3a443e',ISSUER.tel],
  ];
  lines.forEach(([f,c,t])=>{x.font=f+' "Malgun Gothic",sans-serif';x.fillStyle=c;x.fillText(t,50,y);y+=lh;});
  cv._name=vname;
}
function roundRect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}

function invoiceFileName(){
  const v=currentVendor?currentVendor.name:'거래처';
  return '계산서요청_'+v+'_'+todayStr()+'.png';
}
document.getElementById('inv-download').onclick=()=>{
  const cv=document.getElementById('invCanvas');
  const a=document.createElement('a');a.download=invoiceFileName();a.href=cv.toDataURL('image/png');a.click();
  toast('이미지를 저장했어요');
};
document.getElementById('inv-share').onclick=async()=>{
  const cv=document.getElementById('invCanvas');
  cv.toBlob(async blob=>{
    const file=new File([blob],invoiceFileName(),{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:'전자세금계산서 발행정보'});}catch(e){}
    }else{
      const a=document.createElement('a');a.download=invoiceFileName();a.href=cv.toDataURL('image/png');a.click();
      toast('공유 미지원 기기 · 이미지를 저장했어요');
    }
  },'image/png');
};

/* ============================ 백업 / 복구 / CSV ============================ */
document.getElementById('exportBtn').onclick=()=>{
  const data=JSON.stringify({vendors,purchases,exportedAt:new Date().toISOString()},null,2);
  const a=document.createElement('a');a.download='매입장부_백업_'+todayStr()+'.json';
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.click();
  toast('백업 파일을 저장했어요');
};
document.getElementById('importFile').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(!Array.isArray(d.vendors)||!Array.isArray(d.purchases))throw 0;
      if(!confirm('복구하면 현재 데이터를 덮어씁니다. 진행할까요?'))return;
      vendors=d.vendors;purchases=d.purchases;persist();
      refreshVendorDatalist();renderAll();toast('복구 완료');
    }catch(err){toast('올바른 백업 파일이 아닙니다');}
  };
  rd.readAsText(f);e.target.value='';
};
document.getElementById('csvBtn').onclick=()=>{
  let rows=[['매입일자','업체번호','업체명','사업자번호','매입금액']];
  purchases.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(p=>{
    const v=vendorByCode(p.code)||{};
    rows.push([p.date,p.code,v.name||'',v.bizno||'',p.amount]);
  });
  const csv='﻿'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a=document.createElement('a');a.download='매입내역_'+todayStr()+'.csv';
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.click();
  toast('CSV를 저장했어요');
};

/* ============================ 탭 / 모달 ============================ */
document.querySelectorAll('nav.tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  b.classList.add('on');document.getElementById(b.dataset.tab).classList.add('active');
  if(b.dataset.tab==='view-history')renderHistory();
  if(b.dataset.tab==='view-dash')renderDash();
  if(b.dataset.tab==='view-vendor')renderVendors();
});
function show(id){document.getElementById(id).classList.add('show');}
function hide(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('[data-close]').forEach(el=>el.onclick=()=>el.closest('.modal').classList.remove('show'));

// custom range inputs
[['hist','hist'],['dash','dash'],['vm','vm']].forEach(([scope])=>{
  const f=document.getElementById(scope+'-from'),t=document.getElementById(scope+'-to');
  if(f)f.onchange=()=>{customRange[scope].from=f.value;renderScope(scope);};
  if(t)t.onchange=()=>{customRange[scope].to=t.value;renderScope(scope);};
});

/* ============================ 초기화 ============================ */
function renderAll(){renderHistory();renderDash();renderVendors();updateTodayCount();}
function init(){
  inDate.value=todayStr();
  buildPeriodBars();refreshVendorDatalist();renderAll();
  inVendor.focus();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
}
init();
</script>
